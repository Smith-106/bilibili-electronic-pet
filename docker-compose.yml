services:
  migrate:
    build:
      context: .
      dockerfile: backend-ts/Dockerfile
    command: ["npm", "run", "prisma:migrate:prod"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/dev.db}
      - API_KEY=${API_KEY:-}
      - GATEWAY_TOKEN=${GATEWAY_TOKEN:-}
      - GATEWAY_HMAC_SECRET=${GATEWAY_HMAC_SECRET:-}
      - COMMENT_INGRESS_TOKEN=${COMMENT_INGRESS_TOKEN:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - KILL_SWITCH=false
      - ROLE_PROFILE_DEFAULT=doro
    volumes:
      - sqlite-data:/app/data
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend-ts/Dockerfile
    command: ["node", "dist/index.js"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/dev.db}
      - API_KEY=${API_KEY:-}
      - GATEWAY_TOKEN=${GATEWAY_TOKEN:-}
      - GATEWAY_HMAC_SECRET=${GATEWAY_HMAC_SECRET:-}
      - COMMENT_INGRESS_TOKEN=${COMMENT_INGRESS_TOKEN:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_FALLBACK_TO_MOCK=${LLM_FALLBACK_TO_MOCK:-false}
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-serpapi}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - SEARCH_CX=${SEARCH_CX:-}
      - PUBLISHER_MODE=${PUBLISHER_MODE:-manual_queue}
      - PUBLISHER_WEBHOOK_URL=${PUBLISHER_WEBHOOK_URL:-}
      - PUBLISHER_WEBHOOK_TOKEN=${PUBLISHER_WEBHOOK_TOKEN:-}
      - BILIBILI_ENABLED=${BILIBILI_ENABLED:-false}
      - BILIBILI_POLL_ENABLED=${BILIBILI_POLL_ENABLED:-false}
      - BILIBILI_POLL_INTERVAL_SECONDS=${BILIBILI_POLL_INTERVAL_SECONDS:-300}
      - BILIBILI_PUBLISH_ENABLED=${BILIBILI_PUBLISH_ENABLED:-false}
      - BILIBILI_SESSDATA=${BILIBILI_SESSDATA:-}
      - BILIBILI_BILI_JCT=${BILIBILI_BILI_JCT:-}
      - BILIBILI_BUVID3=${BILIBILI_BUVID3:-}
      - BILIBILI_BUVID4=${BILIBILI_BUVID4:-}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - WORKER_MAX_RETRIES=3
      - WORKER_RETRY_BACKOFF=2
      - WORKER_RETRY_JITTER=true
      - KILL_SWITCH=false
      - ROLE_PROFILE_DEFAULT=doro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - sqlite-data:/app/data
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend-ts/Dockerfile
    command: ["node", "dist/workers/worker-main.js"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/dev.db}
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_FALLBACK_TO_MOCK=${LLM_FALLBACK_TO_MOCK:-false}
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-serpapi}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - SEARCH_CX=${SEARCH_CX:-}
      - BILIBILI_ENABLED=${BILIBILI_ENABLED:-false}
      - BILIBILI_POLL_ENABLED=${BILIBILI_POLL_ENABLED:-false}
      - BILIBILI_POLL_INTERVAL_SECONDS=${BILIBILI_POLL_INTERVAL_SECONDS:-300}
      - BILIBILI_PUBLISH_ENABLED=${BILIBILI_PUBLISH_ENABLED:-false}
      - BILIBILI_SESSDATA=${BILIBILI_SESSDATA:-}
      - BILIBILI_BILI_JCT=${BILIBILI_BILI_JCT:-}
      - BILIBILI_BUVID3=${BILIBILI_BUVID3:-}
      - BILIBILI_BUVID4=${BILIBILI_BUVID4:-}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - WORKER_MAX_RETRIES=3
      - WORKER_RETRY_BACKOFF=2
      - WORKER_RETRY_JITTER=true
      - KILL_SWITCH=false
      - ROLE_PROFILE_DEFAULT=doro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - sqlite-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f localhost:3100/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  douyin-sidecar:
    profiles: ["sidecar"]
    build:
      context: ./douyin-sidecar
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DOUYIN_SIDECAR_TOKEN=${DOUYIN_SIDECAR_TOKEN:-replace-with-sidecar-token}
      - DOUYIN_DRIVER_MODE=${DOUYIN_DRIVER_MODE:-mock}
      - DOUYIN_UPSTREAM_URL=${DOUYIN_UPSTREAM_URL:-}
      - DOUYIN_UPSTREAM_TOKEN=${DOUYIN_UPSTREAM_TOKEN:-}
    restart: unless-stopped

  qq-sidecar:
    profiles: ["sidecar"]
    build:
      context: ./qq-sidecar
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - QQ_SIDECAR_TOKEN=${QQ_SIDECAR_TOKEN:-replace-with-sidecar-token}
      - QQ_DRIVER_MODE=${QQ_DRIVER_MODE:-mock}
      - QQ_UPSTREAM_URL=${QQ_UPSTREAM_URL:-}
      - QQ_UPSTREAM_TOKEN=${QQ_UPSTREAM_TOKEN:-}
      - QQ_ONEBOT_URL=${QQ_ONEBOT_URL:-}
      - QQ_ONEBOT_TOKEN=${QQ_ONEBOT_TOKEN:-}
    restart: unless-stopped

volumes:
  sqlite-data:
  redis-data:
