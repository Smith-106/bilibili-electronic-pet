services:
  migrate:
    build:
      context: .
      dockerfile: backend-ts/Dockerfile
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/dev.db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - KILL_SWITCH=false
      - ROLE_PROFILE_DEFAULT=doro
    volumes:
      - sqlite-data:/app/data
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend-ts/Dockerfile
    command: ["node", "dist/index.js"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/dev.db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - WORKER_MAX_RETRIES=3
      - WORKER_RETRY_BACKOFF=2
      - WORKER_RETRY_JITTER=true
      - KILL_SWITCH=false
      - ROLE_PROFILE_DEFAULT=doro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - sqlite-data:/app/data
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend-ts/Dockerfile
    command: ["node", "dist/workers/worker-main.js"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/dev.db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - WORKER_MAX_RETRIES=3
      - WORKER_RETRY_BACKOFF=2
      - WORKER_RETRY_JITTER=true
      - KILL_SWITCH=false
      - ROLE_PROFILE_DEFAULT=doro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - sqlite-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'dist/workers/worker-main.js' >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  douyin-sidecar:
    profiles: ["sidecar"]
    build:
      context: ./douyin-sidecar
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DOUYIN_SIDECAR_TOKEN=${DOUYIN_SIDECAR_TOKEN:-replace-with-sidecar-token}
      - DOUYIN_DRIVER_MODE=${DOUYIN_DRIVER_MODE:-mock}
      - DOUYIN_UPSTREAM_URL=${DOUYIN_UPSTREAM_URL:-}
      - DOUYIN_UPSTREAM_TOKEN=${DOUYIN_UPSTREAM_TOKEN:-}
    restart: unless-stopped

volumes:
  sqlite-data:
  redis-data:
