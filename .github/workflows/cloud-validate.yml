name: cloud-validate

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pr-merge-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pytest

      - name: Migration smoke check
        env:
          DATABASE_URL: sqlite:///${{ github.workspace }}/ci-migration.sqlite3
        run: alembic upgrade head

      - name: Run backend regression tests
        env:
          PYTHONPATH: .
          BILIBILI_COOKIE_ENCRYPTION_KEY: test-ci-encryption-key-32-bytes!
        run: |
          pytest app/tests/test_admin_api.py -q
          pytest app/tests/test_comments_api.py -q
          pytest app/tests/test_gateway_publish.py -q

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend assets
        run: npm --prefix frontend run build

      - name: Build Docker image
        run: docker build -t bilibili-electronic-pet:ci .

  release-only-gate:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pytest

      - name: Run release-only full test suite
        env:
          PYTHONPATH: .
          BILIBILI_COOKIE_ENCRYPTION_KEY: test-ci-encryption-key-32-bytes!
        run: python -m pytest app/tests -q
