name: cloud-validate

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: advice.defaultBranchName
  GIT_CONFIG_VALUE_0: "false"

jobs:
  pr-merge-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Migration smoke check
        env:
          DATABASE_URL: sqlite:///${{ github.workspace }}/ci-migration.sqlite3
        run: alembic upgrade head

      - name: Run backend regression tests
        env:
          PYTHONPATH: .
          BILIBILI_COOKIE_ENCRYPTION_KEY: test-ci-encryption-key-32-bytes!
        run: |
          pytest app/tests/test_admin_api.py -q
          pytest app/tests/test_comments_api.py -q
          pytest app/tests/test_gateway_publish.py -q

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend assets
        run: npm --prefix frontend run build

      - name: Build Docker image
        run: docker build -t bilibili-electronic-pet:ci .

  backend-ts-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend-ts/package-lock.json

      - name: Install backend-ts dependencies
        run: npm --prefix backend-ts ci

      - name: Run backend-ts tests
        run: npm --prefix backend-ts test

      - name: Build backend-ts
        run: npm --prefix backend-ts run build

      - name: Smoke health and readiness
        env:
          HOST: 127.0.0.1
          PORT: 18000
        run: |
          node backend-ts/dist/index.js &
          APP_PID=$!
          trap 'kill $APP_PID' EXIT

          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:18000/health >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:18000/health
          curl -fsS http://127.0.0.1:18000/readiness

  release-only-gate:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Run release-only backend suite
        env:
          PYTHONPATH: .
          BILIBILI_COOKIE_ENCRYPTION_KEY: test-ci-encryption-key-32-bytes!
        run: python -m pytest app/tests -q --ignore=app/tests/test_e2e_user_flow.py
