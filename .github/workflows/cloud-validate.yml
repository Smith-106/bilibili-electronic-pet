name: cloud-validate

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: advice.defaultBranchName
  GIT_CONFIG_VALUE_0: "false"

jobs:
  # TypeScript backend — primary validation gate
  backend-ts-validate:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend-ts/package-lock.json

      - name: Install backend-ts dependencies
        run: npm --prefix backend-ts ci

      - name: Generate Prisma client
        run: npm --prefix backend-ts run prisma:generate

      - name: Run backend-ts tests
        run: npm --prefix backend-ts test

      - name: Build backend-ts
        run: npm --prefix backend-ts run build

      - name: Prepare SQLite schema for strict staging check
        env:
          DATABASE_URL: file:./ci-smoke.db
        run: npm --prefix backend-ts run prisma:migrate:prod

      - name: Preflight staging smoke contract (non-blocking diagnostics)
        env:
          API_KEY: ci-admin-key
          REPORT_PATH: backend-ts/ci-preflight-report.json
        run: bash smoke.sh preflight --strict --api-key "$API_KEY" --report "$REPORT_PATH"

      - name: Strict staging smoke contract
        env:
          PORT: 18000
          BASE_URL: http://127.0.0.1:18000
          API_KEY: ci-admin-key
          DATABASE_URL: file:./ci-smoke.db
        run: |
          (
            cd backend-ts
            node dist/index.js
          ) &
          APP_PID=$!
          trap 'kill $APP_PID' EXIT

          bash smoke.sh strict --base-url "$BASE_URL" --api-key "$API_KEY"

  # Frontend build validation
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend assets
        run: npm --prefix frontend run build

      - name: Build Docker image
        run: docker build -f backend-ts/Dockerfile -t bilibili-electronic-pet:ci .

  # Release gate — full TS suite
  release-only-gate:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    runs-on: ubuntu-latest
    needs: [backend-ts-validate, frontend-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend-ts/package-lock.json

      - name: Install backend-ts dependencies
        run: npm --prefix backend-ts ci

      - name: Generate Prisma client
        run: npm --prefix backend-ts run prisma:generate

      - name: Run backend-ts full suite
        run: npm --prefix backend-ts test

      - name: Build backend-ts
        run: npm --prefix backend-ts run build
