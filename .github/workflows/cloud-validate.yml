name: cloud-validate

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: advice.defaultBranchName
  GIT_CONFIG_VALUE_0: "false"

jobs:
  # TypeScript backend 閳?primary validation gate
  backend-ts-validate:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend-ts/package-lock.json
            qq-sidecar/package-lock.json

      - name: Install backend-ts dependencies
        run: npm --prefix backend-ts ci

      - name: Install qq-sidecar dependencies
        run: npm --prefix qq-sidecar ci

      - name: Run qq-sidecar tests
        run: npm --prefix qq-sidecar test

      - name: Build qq-sidecar
        run: npm --prefix qq-sidecar run build

      - name: Generate Prisma client
        run: npm --prefix backend-ts run prisma:generate

      - name: Run backend-ts tests
        run: npm --prefix backend-ts test

      - name: Build backend-ts
        run: npm --prefix backend-ts run build

      - name: Run QQ OneBot smoke
        run: bash smoke.sh qq-onebot

      - name: Run QQ sidecar e2e smoke
        run: bash smoke.sh qq-e2e

      - name: Prepare SQLite schema for strict staging check
        env:
          DATABASE_URL: file:./ci-smoke.db
        run: npm --prefix backend-ts run prisma:migrate:prod

      - name: Preflight staging smoke contract
        env:
          API_KEY: ci-admin-key
          COMMENT_INGRESS_TOKEN: ci-comment-ingress-token
          REPORT_PATH: backend-ts/ci-preflight-report.json
          LLM_PROVIDER: openai
          LLM_API_KEY: ci-preflight-placeholder
          LLM_FALLBACK_TO_MOCK: "false"
          SEARCH_PROVIDER: serpapi
          SEARCH_API_KEY: ci-preflight-placeholder
          PUBLISHER_MODE: webhook
          PUBLISHER_WEBHOOK_URL: https://example.invalid/preflight
          BILIBILI_ENABLED: "true"
          BILIBILI_PUBLISH_ENABLED: "true"
          BILIBILI_SESSDATA: ci-placeholder-sessdata
          BILIBILI_BILI_JCT: ci-placeholder-jct
          BILIBILI_BUVID3: ci-placeholder-buvid3
          CREDENTIAL_ENCRYPTION_KEY: ef6e945de4590077bcf7857bdbde3ceedcd3268741b04cfa7a77208d1c2ef79c
        run: |
          bash smoke.sh preflight --strict --api-key "$API_KEY" --report "$REPORT_PATH"
          node -e "const fs=require('node:fs'); const report=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); if (report.status !== 'preflight_ready') { console.error('Preflight gate failed:', report.status); console.error(JSON.stringify(report.delivery_preflight, null, 2)); process.exit(1); } console.log('Preflight gate passed.');" "$REPORT_PATH"

      # Strict staging smoke (product_ready gate incl. auth_probe_healthy) moved to
      # build-and-push-ghcr pre-release-smoke job — it needs real Bilibili credentials
      # (PRE_RELEASE_SMOKE_BASE_URL on Oracle pre-release env) to probe auth live, which
      # CI cannot provide with placeholder sessdata. CI keeps preflight (build + foundation
      # + delivery contract); strict/real-chain run against the pre-release deployment.

      - name: Upload staging smoke reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ts-staging-smoke-reports
          if-no-files-found: warn
          path: |
            .artifacts/staging/*.json
            backend-ts/ci-preflight-report.json

  # Frontend build validation
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            pet-companion-web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend tests
        run: npm --prefix frontend test

      - name: Build frontend assets
        run: npm --prefix frontend run build

      - name: Install companion dependencies
        run: npm --prefix pet-companion-web ci

      - name: Run companion tests
        run: npm --prefix pet-companion-web test

      - name: Build companion assets
        run: npm --prefix pet-companion-web run build

      - name: Build Docker image
        run: docker build -f backend-ts/Dockerfile -t bilibili-electronic-pet:ci .

      - name: Smoke containerized Prisma migrate path
        run: docker run --rm -e DATABASE_URL=file:/tmp/container-smoke.db bilibili-electronic-pet:ci npm run prisma:migrate:prod

  # Release gate 閳?full TS suite
  release-only-gate:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    runs-on: ubuntu-latest
    needs: [backend-ts-validate, frontend-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend-ts/package-lock.json
            qq-sidecar/package-lock.json

      - name: Install backend-ts dependencies
        run: npm --prefix backend-ts ci

      - name: Install qq-sidecar dependencies
        run: npm --prefix qq-sidecar ci

      - name: Run qq-sidecar tests
        run: npm --prefix qq-sidecar test

      - name: Build qq-sidecar
        run: npm --prefix qq-sidecar run build

      - name: Generate Prisma client
        run: npm --prefix backend-ts run prisma:generate

      - name: Run backend-ts full suite
        run: npm --prefix backend-ts test

      - name: Build backend-ts
        run: npm --prefix backend-ts run build
