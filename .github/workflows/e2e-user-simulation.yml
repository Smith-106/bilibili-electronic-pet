name: e2e-strict-business-acceptance

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: advice.defaultBranchName
  GIT_CONFIG_VALUE_0: "false"

jobs:
  release-gate-config:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
    runs-on: ubuntu-latest
    outputs:
      pre_release_smoke_ready: ${{ steps.detect.outputs.pre_release_smoke_ready }}

    steps:
      - name: Detect pre-release smoke configuration
        id: detect
        env:
          PRE_RELEASE_SMOKE_BASE_URL: ${{ secrets.PRE_RELEASE_SMOKE_BASE_URL }}
          PRE_RELEASE_SMOKE_API_KEY: ${{ secrets.PRE_RELEASE_SMOKE_API_KEY }}
        run: |
          if [[ -n "${PRE_RELEASE_SMOKE_BASE_URL}" && -n "${PRE_RELEASE_SMOKE_API_KEY}" ]]; then
            echo "pre_release_smoke_ready=true" >> "$GITHUB_OUTPUT"
            echo "Pre-release smoke configuration detected."
          else
            echo "pre_release_smoke_ready=false" >> "$GITHUB_OUTPUT"
            echo "::error::Missing PRE_RELEASE_SMOKE_BASE_URL or PRE_RELEASE_SMOKE_API_KEY for a release path."
            exit 1
          fi

  strict-business-acceptance:
    name: strict business acceptance coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend-ts/package-lock.json

      - name: Install backend-ts dependencies
        run: npm --prefix backend-ts ci

      - name: Generate Prisma client
        run: npm --prefix backend-ts run prisma:generate

      - name: Build backend-ts
        run: npm --prefix backend-ts run build

      - name: Push database schema
        working-directory: backend-ts
        env:
          DATABASE_URL: file:./test.db
        run: npx prisma db push --accept-data-loss

      - name: Start app and run smoke tests
        working-directory: backend-ts
        env:
          APP_ENV: test
          PORT: 18000
          DATABASE_URL: file:./test.db
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_DB: 0
          API_KEY: test-api-key-e2e
          GATEWAY_TOKEN: test-gateway-token
          GATEWAY_HMAC_SECRET: test-hmac-secret-32-bytes!!
          KILL_SWITCH: "false"
          LLM_PROVIDER: openai
          LLM_API_KEY: e2e-strict-placeholder
          SEARCH_PROVIDER: serpapi
          SEARCH_API_KEY: e2e-strict-placeholder
          PUBLISHER_MODE: webhook
          PUBLISHER_WEBHOOK_URL: https://example.invalid/e2e-strict
          PLATFORM_QQ_ENABLED: "true"
          PLATFORM_QQ_WEBHOOK_URL: https://example.invalid/qq-sidecar
          BASE_URL: http://localhost:18000
        run: |
          node dist/index.js &
          APP_PID=$!
          trap 'kill $APP_PID 2>/dev/null' EXIT

          for i in {1..30}; do
            if curl -fsS http://localhost:18000/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          curl -fsS http://localhost:18000/health || exit 1
          bash ../smoke.sh strict --base-url "$BASE_URL" --api-key "$API_KEY"

  pre-release-smoke:
    if: ${{ needs.release-gate-config.outputs.pre_release_smoke_ready == 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))) }}
    needs: [release-gate-config, strict-business-acceptance]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend-ts/package-lock.json

      - name: Install backend-ts dependencies
        run: npm --prefix backend-ts ci

      - name: Validate pre-release smoke inputs
        env:
          PRE_RELEASE_SMOKE_BASE_URL: ${{ secrets.PRE_RELEASE_SMOKE_BASE_URL }}
          PRE_RELEASE_SMOKE_API_KEY: ${{ secrets.PRE_RELEASE_SMOKE_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          SEARCH_PROVIDER: ${{ vars.SEARCH_PROVIDER }}
          PUBLISHER_MODE: ${{ vars.PUBLISHER_MODE }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          SEARCH_CX: ${{ secrets.SEARCH_CX }}
          PUBLISHER_WEBHOOK_URL: ${{ secrets.PUBLISHER_WEBHOOK_URL }}
          PUBLISHER_WEBHOOK_TOKEN: ${{ secrets.PUBLISHER_WEBHOOK_TOKEN }}
          BILIBILI_ENABLED: ${{ vars.BILIBILI_ENABLED }}
          BILIBILI_PUBLISH_ENABLED: ${{ vars.BILIBILI_PUBLISH_ENABLED }}
          BILIBILI_SESSDATA: ${{ secrets.BILIBILI_SESSDATA }}
          BILIBILI_BILI_JCT: ${{ secrets.BILIBILI_BILI_JCT }}
          BILIBILI_BUVID3: ${{ secrets.BILIBILI_BUVID3 }}
          BILIBILI_BUVID4: ${{ secrets.BILIBILI_BUVID4 }}
          BILIBILI_DEDEUSERID: ${{ secrets.BILIBILI_DEDEUSERID }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
        run: |
          ROLLOUT_BRANCH="${PUBLISHER_MODE:-webhook}"
          if [[ -z "${PRE_RELEASE_SMOKE_BASE_URL}" ]]; then
            echo "::error::Missing PRE_RELEASE_SMOKE_BASE_URL secret for release pre-check."
            exit 1
          fi
          if [[ -z "${PRE_RELEASE_SMOKE_API_KEY}" ]]; then
            echo "::error::Missing PRE_RELEASE_SMOKE_API_KEY secret for release pre-check."
            exit 1
          fi
          if [[ -z "${LLM_PROVIDER}" ]]; then
            echo "::warning::LLM_PROVIDER variable missing; defaulting to openai for release smoke."
            LLM_PROVIDER="openai"
          fi
          if [[ -z "${LLM_API_KEY}" ]]; then
            echo "::error::Missing LLM_API_KEY secret for release pre-check."
            exit 1
          fi
          if [[ "${ROLLOUT_BRANCH}" == "webhook" && -z "${PUBLISHER_WEBHOOK_URL}" ]]; then
            echo "::error::Missing PUBLISHER_WEBHOOK_URL secret for webhook release smoke."
            exit 1
          fi
          if [[ "${ROLLOUT_BRANCH}" != "webhook" ]]; then
            if [[ "${BILIBILI_ENABLED}" != "true" || "${BILIBILI_PUBLISH_ENABLED}" != "true" ]]; then
              echo "::error::BILIBILI_ENABLED and BILIBILI_PUBLISH_ENABLED must both be true for native release smoke."
              exit 1
            fi
            if [[ -z "${BILIBILI_SESSDATA}" || -z "${BILIBILI_BILI_JCT}" || -z "${BILIBILI_BUVID3}" ]]; then
              echo "::error::Missing native Bilibili credentials for native release smoke."
              exit 1
            fi
            if [[ -z "${CREDENTIAL_ENCRYPTION_KEY}" ]]; then
              echo "::error::Missing CREDENTIAL_ENCRYPTION_KEY for native release smoke."
              exit 1
            fi
          fi

      - name: Run pre-release smoke contract
        env:
          BASE_URL: ${{ secrets.PRE_RELEASE_SMOKE_BASE_URL }}
          API_KEY: ${{ secrets.PRE_RELEASE_SMOKE_API_KEY }}
          SMOKE_DIRECT_IP: ${{ vars.PRE_RELEASE_SMOKE_ORIGIN_IP }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          SEARCH_PROVIDER: ${{ vars.SEARCH_PROVIDER }}
          PUBLISHER_MODE: ${{ vars.PUBLISHER_MODE }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          SEARCH_CX: ${{ secrets.SEARCH_CX }}
          PUBLISHER_WEBHOOK_URL: ${{ secrets.PUBLISHER_WEBHOOK_URL }}
          PUBLISHER_WEBHOOK_TOKEN: ${{ secrets.PUBLISHER_WEBHOOK_TOKEN }}
          BILIBILI_ENABLED: ${{ vars.BILIBILI_ENABLED }}
          BILIBILI_PUBLISH_ENABLED: ${{ vars.BILIBILI_PUBLISH_ENABLED }}
          BILIBILI_SESSDATA: ${{ secrets.BILIBILI_SESSDATA }}
          BILIBILI_BILI_JCT: ${{ secrets.BILIBILI_BILI_JCT }}
          BILIBILI_BUVID3: ${{ secrets.BILIBILI_BUVID3 }}
          BILIBILI_BUVID4: ${{ secrets.BILIBILI_BUVID4 }}
          BILIBILI_DEDEUSERID: ${{ secrets.BILIBILI_DEDEUSERID }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
        run: |
          export LLM_PROVIDER="${LLM_PROVIDER:-openai}"
          export SEARCH_PROVIDER="${SEARCH_PROVIDER:-serpapi}"
          export PUBLISHER_MODE="${PUBLISHER_MODE:-webhook}"
          export BILIBILI_ENABLED="${BILIBILI_ENABLED:-false}"
          export BILIBILI_PUBLISH_ENABLED="${BILIBILI_PUBLISH_ENABLED:-false}"
          if [[ "${PUBLISHER_MODE}" == "webhook" ]]; then
            bash smoke.sh strict --base-url "$BASE_URL" --api-key "$API_KEY"
          else
            bash smoke.sh real-chain --base-url "$BASE_URL" --api-key "$API_KEY"
          fi
