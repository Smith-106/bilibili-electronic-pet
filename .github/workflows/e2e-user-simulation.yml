name: e2e-user-simulation

on:
  workflow_dispatch:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: bili_pet_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx celery[redis]

      - name: Wait for services
        run: |
          sleep 5
          pg_isready -h localhost -p 5432

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+psycopg://test_user:test_pass@localhost:5432/bili_pet_test
        run: alembic upgrade head

      - name: Start application in background
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+psycopg://test_user:test_pass@localhost:5432/bili_pet_test
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          API_KEY: test-api-key-e2e
          GATEWAY_TOKEN: test-gateway-token
          GATEWAY_HMAC_SECRET: test-hmac-secret-32-bytes!!
          BILIBILI_COOKIE_ENCRYPTION_KEY: test-encryption-key-32-bytes!!
          BILIBILI_ENABLED: "false"
          LLM_PROVIDER: mock
          PUBLISHER_MODE: simulated
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 18000 &
          sleep 10
          curl -sS http://localhost:18000/health || exit 1

      - name: Run E2E user simulation tests
        env:
          BASE_URL: http://localhost:18000
          API_KEY: test-api-key-e2e
          DATABASE_URL: postgresql+psycopg://test_user:test_pass@localhost:5432/bili_pet_test
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          BILIBILI_COOKIE_ENCRYPTION_KEY: test-encryption-key-32-bytes!!
        run: |
          python -m pytest app/tests/test_e2e_user_flow.py -v --tb=short

      - name: Cleanup
        if: always()
        run: |
          pkill -f "uvicorn app.main:app" || true
