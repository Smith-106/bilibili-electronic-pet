name: build-and-push-ghcr

on:
  workflow_dispatch:
  push:
    branches: ["**"]

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: advice.defaultBranchName
  GIT_CONFIG_VALUE_0: "false"

permissions:
  contents: read
  packages: write

jobs:
  release-gate-config:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
    runs-on: ubuntu-latest
    outputs:
      pre_release_smoke_ready: ${{ steps.detect.outputs.pre_release_smoke_ready }}

    steps:
      - name: Detect pre-release smoke configuration
        id: detect
        env:
          PRE_RELEASE_SMOKE_BASE_URL: ${{ secrets.PRE_RELEASE_SMOKE_BASE_URL }}
          PRE_RELEASE_SMOKE_API_KEY: ${{ secrets.PRE_RELEASE_SMOKE_API_KEY }}
        run: |
          if [[ -n "${PRE_RELEASE_SMOKE_BASE_URL}" && -n "${PRE_RELEASE_SMOKE_API_KEY}" ]]; then
            echo "pre_release_smoke_ready=true" >> "$GITHUB_OUTPUT"
            echo "Pre-release real-chain smoke configuration detected."
          else
            echo "pre_release_smoke_ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping release-only real-chain jobs because PRE_RELEASE_SMOKE_BASE_URL or PRE_RELEASE_SMOKE_API_KEY is not configured."
          fi

  pre-release-real-chain-smoke:
    if: ${{ needs.release-gate-config.outputs.pre_release_smoke_ready == 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))) }}
    needs: [release-gate-config]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate real-chain smoke secrets
        env:
          PRE_RELEASE_SMOKE_BASE_URL: ${{ secrets.PRE_RELEASE_SMOKE_BASE_URL }}
          PRE_RELEASE_SMOKE_API_KEY: ${{ secrets.PRE_RELEASE_SMOKE_API_KEY }}
        run: |
          if [[ -z "${PRE_RELEASE_SMOKE_BASE_URL}" ]]; then
            echo "::error::Missing PRE_RELEASE_SMOKE_BASE_URL secret for release/promotion."
            exit 1
          fi
          if [[ -z "${PRE_RELEASE_SMOKE_API_KEY}" ]]; then
            echo "::error::Missing PRE_RELEASE_SMOKE_API_KEY secret for release/promotion."
            exit 1
          fi

      - name: Run pre-release real-chain smoke contract
        env:
          BASE_URL: ${{ secrets.PRE_RELEASE_SMOKE_BASE_URL }}
          API_KEY: ${{ secrets.PRE_RELEASE_SMOKE_API_KEY }}
        run: bash smoke.sh real-chain --base-url "$BASE_URL" --api-key "$API_KEY"

  docker-ghcr-preview:
    if: ${{ github.event_name == 'push' && github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend-ts/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  docker-ghcr-release-dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: [release-gate-config]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend-ts/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  docker-ghcr-release-gated:
    if: ${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && needs.release-gate-config.outputs.pre_release_smoke_ready == 'true' }}
    needs: [release-gate-config, pre-release-real-chain-smoke]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend-ts/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
