name: manual-ghcr-release

on:
  workflow_dispatch:
  push:
    branches:
      - deploy/frontend-backend-alignment-20260408
      - master

permissions:
  contents: read
  packages: write

jobs:
  pre-release-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend-ts/package-lock.json

      - name: Install backend-ts dependencies
        run: npm --prefix backend-ts ci

      - name: Validate release inputs
        env:
          PRE_RELEASE_SMOKE_BASE_URL: ${{ secrets.PRE_RELEASE_SMOKE_BASE_URL }}
          PRE_RELEASE_SMOKE_API_KEY: ${{ secrets.PRE_RELEASE_SMOKE_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          SEARCH_PROVIDER: ${{ vars.SEARCH_PROVIDER }}
          PUBLISHER_MODE: ${{ vars.PUBLISHER_MODE }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          SEARCH_CX: ${{ secrets.SEARCH_CX }}
          PUBLISHER_WEBHOOK_URL: ${{ secrets.PUBLISHER_WEBHOOK_URL }}
          PUBLISHER_WEBHOOK_TOKEN: ${{ secrets.PUBLISHER_WEBHOOK_TOKEN }}
          BILIBILI_ENABLED: ${{ vars.BILIBILI_ENABLED }}
          BILIBILI_PUBLISH_ENABLED: ${{ vars.BILIBILI_PUBLISH_ENABLED }}
          BILIBILI_SESSDATA: ${{ secrets.BILIBILI_SESSDATA }}
          BILIBILI_BILI_JCT: ${{ secrets.BILIBILI_BILI_JCT }}
          BILIBILI_BUVID3: ${{ secrets.BILIBILI_BUVID3 }}
          BILIBILI_BUVID4: ${{ secrets.BILIBILI_BUVID4 }}
          BILIBILI_DEDEUSERID: ${{ secrets.BILIBILI_DEDEUSERID }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
        run: |
          if [[ -z "${PRE_RELEASE_SMOKE_BASE_URL}" || -z "${PRE_RELEASE_SMOKE_API_KEY}" ]]; then
            echo "::error::Missing PRE_RELEASE_SMOKE_BASE_URL or PRE_RELEASE_SMOKE_API_KEY."
            exit 1
          fi

          if [[ -z "${LLM_PROVIDER}" ]]; then
            echo "::warning::LLM_PROVIDER missing; defaulting to openai."
            export LLM_PROVIDER="openai"
          fi

          if [[ -z "${LLM_API_KEY}" ]]; then
            echo "::error::Missing LLM_API_KEY."
            exit 1
          fi

          if [[ "${PUBLISHER_MODE}" == "webhook" ]]; then
            if [[ -z "${PUBLISHER_WEBHOOK_URL}" ]]; then
              echo "::error::Missing PUBLISHER_WEBHOOK_URL for webhook release smoke."
              exit 1
            fi
          else
            if [[ "${BILIBILI_ENABLED}" != "true" || "${BILIBILI_PUBLISH_ENABLED}" != "true" ]]; then
              echo "::error::BILIBILI_ENABLED and BILIBILI_PUBLISH_ENABLED must both be true for native release smoke."
              exit 1
            fi
            if [[ -z "${BILIBILI_SESSDATA}" || -z "${BILIBILI_BILI_JCT}" || -z "${BILIBILI_BUVID3}" ]]; then
              echo "::error::Missing native Bilibili credentials."
              exit 1
            fi
            if [[ -z "${CREDENTIAL_ENCRYPTION_KEY}" ]]; then
              echo "::error::Missing CREDENTIAL_ENCRYPTION_KEY."
              exit 1
            fi
          fi

      - name: Run release smoke
        env:
          BASE_URL: ${{ secrets.PRE_RELEASE_SMOKE_BASE_URL }}
          API_KEY: ${{ secrets.PRE_RELEASE_SMOKE_API_KEY }}
          SMOKE_DIRECT_IP: ${{ vars.PRE_RELEASE_SMOKE_ORIGIN_IP }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          SEARCH_PROVIDER: ${{ vars.SEARCH_PROVIDER }}
          PUBLISHER_MODE: ${{ vars.PUBLISHER_MODE }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          SEARCH_CX: ${{ secrets.SEARCH_CX }}
          PUBLISHER_WEBHOOK_URL: ${{ secrets.PUBLISHER_WEBHOOK_URL }}
          PUBLISHER_WEBHOOK_TOKEN: ${{ secrets.PUBLISHER_WEBHOOK_TOKEN }}
          BILIBILI_ENABLED: ${{ vars.BILIBILI_ENABLED }}
          BILIBILI_PUBLISH_ENABLED: ${{ vars.BILIBILI_PUBLISH_ENABLED }}
          BILIBILI_SESSDATA: ${{ secrets.BILIBILI_SESSDATA }}
          BILIBILI_BILI_JCT: ${{ secrets.BILIBILI_BILI_JCT }}
          BILIBILI_BUVID3: ${{ secrets.BILIBILI_BUVID3 }}
          BILIBILI_BUVID4: ${{ secrets.BILIBILI_BUVID4 }}
          BILIBILI_DEDEUSERID: ${{ secrets.BILIBILI_DEDEUSERID }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
        run: |
          export LLM_PROVIDER="${LLM_PROVIDER:-openai}"
          export SEARCH_PROVIDER="${SEARCH_PROVIDER:-serpapi}"
          export PUBLISHER_MODE="${PUBLISHER_MODE:-webhook}"
          export BILIBILI_ENABLED="${BILIBILI_ENABLED:-false}"
          export BILIBILI_PUBLISH_ENABLED="${BILIBILI_PUBLISH_ENABLED:-false}"

          if [[ "${PUBLISHER_MODE}" == "webhook" ]]; then
            bash smoke.sh strict --base-url "$BASE_URL" --api-key "$API_KEY"
          else
            bash smoke.sh real-chain --base-url "$BASE_URL" --api-key "$API_KEY"
          fi

      - name: Upload pre-release smoke reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-release-smoke-reports-${{ github.run_id }}
          if-no-files-found: warn
          path: .artifacts/staging/*.json

  build-release:
    needs: [pre-release-smoke]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend-ts/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
