version: "3.8"

x-ghcr-image: &ghcr_image ${GHCR_IMAGE_REF:-ghcr.io/smith-106/bilibili-electronic-pet:latest}

services:
  migrate:
    image: *ghcr_image
    command: ["npx", "prisma", "migrate", "deploy"]

  api:
    image: *ghcr_image
    command: ["node", "dist/index.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  worker:
    image: *ghcr_image
    command: ["node", "dist/workers/worker-main.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3100/healthz',r=>process.exit(r.statusCode===200?0:1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
